name: CI

on:
  push:
    branches: ["**"]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --no-dev

      - name: Install ruff and mypy
        run: pip install ruff mypy

      - name: Ruff format
        run: ruff format .

      - name: Ruff linter
        run: ruff check .

      - name: Mypy
        run: mypy .

      - name: Unit tests
        run: uv test

      - name: Integration tests
        run: uv test --tests=integration

      - name: BDD tests
        run: uv test --tests=bdd